function onChartScroll(el) {
  _savedCsvScroll = el.scrollLeft;
  if (Date.now() < _ignoreScrollUntil) return;
  clearTimeout(_csvScrollDebounce);
  _csvScrollDebounce = setTimeout(() => {
    if (!_csvChartMeta) return;
    const { monthMeta, PL } = _csvChartMeta;
    const centerX = el.scrollLeft + el.offsetWidth / 2 + PL;
    let newMonth = csvMonth, minDist = Infinity;
    Object.entries(monthMeta).forEach(([mk, meta]) => {
      const dist = Math.abs(centerX - meta.centerX);
      if (dist < minDist) { minDist = dist; newMonth = mk; }
    });
    if (newMonth !== csvMonth) {
      csvMonth = newMonth;
      _preserveCsvScroll = true;
      renderCSV();
    }
  }, 220);
}

function build7DayCard(shopKey, currentDays, currentDayKeys, shopAds, feeRate, rate) {
  const shopData = csvData[shopKey] || {};
  const [csvY, csvM] = csvMonth.split('-').map(Number);
  const daysInMonth = new Date(csvY, csvM, 0).getDate();
  const pad2 = n => String(n).padStart(2,'0');

  const getDay = dk => (shopData[dk.substring(0,7)] || {})[dk] || null;
  const getShiftedAds = dk => {
    const [y,m,d] = dk.split('-').map(Number);
    const ndt = new Date(y, m-1, d+1);
    const ndk = `${ndt.getFullYear()}-${pad2(ndt.getMonth()+1)}-${pad2(ndt.getDate())}`;
    return ((shopData[ndk.substring(0,7)] || {})[ndk] || {}).etsyAds || 0;
  };

  const calcSegment = dkArr => {
    let costAds = 0, profitAds = 0, profitCount = 0, dayCount = 0;
    dkArr.forEach(dk => {
      const d = getDay(dk); if (!d) return;
      dayCount++;
      const clickAds = getShiftedAds(dk);
      costAds += clickAds * 1.21;
      if (dk in shopAds) {
        const adsEur = parseFloat(shopAds[dk]||0) * rate;
        profitAds += adsEur - (clickAds + adsEur * feeRate) * 1.21;
        profitCount++;
      }
    });
    return { costAds, profitAds, profitCount, dayCount };
  };

  // Real calendar weeks: Monday–Sunday, clipped to current month
  const firstOfMonth = new Date(csvY, csvM - 1, 1);
  const dow1 = firstOfMonth.getDay(); // 0=Sun,1=Mon,...,6=Sat
  const daysBack = dow1 === 0 ? 6 : dow1 - 1;
  let wStart = new Date(csvY, csvM - 1, 1 - daysBack);

  const segments = [];
  while (true) {
    const dks = [];
    for (let i = 0; i < 7; i++) {
      const cur = new Date(wStart.getFullYear(), wStart.getMonth(), wStart.getDate() + i);
      if (cur.getFullYear() === csvY && cur.getMonth() + 1 === csvM)
        dks.push(`${csvY}-${pad2(csvM)}-${pad2(cur.getDate())}`);
    }
    if (dks.length > 0) {
      const m = calcSegment(dks);
      if (m.dayCount > 0)
        segments.push({ dks, ...m, label: `${pad2(Number(dks[0].split('-')[2]))}–${pad2(Number(dks[dks.length-1].split('-')[2]))}` });
    }
    wStart = new Date(wStart.getFullYear(), wStart.getMonth(), wStart.getDate() + 7);
    if (wStart.getMonth() + 1 > csvM || wStart.getFullYear() > csvY) break;
  }

  if (segments.length === 0) return '';

  const hasProfitAds = segments.some(s => s.profitCount > 0);
  const col = v => v >= 0 ? 'var(--accent2)' : 'var(--red)';

  const cells = segments.map((s, i) => {
    const prev = segments[i-1];
    let arrow = '';
    if (prev) {
      const ref = hasProfitAds ? prev.profitAds : prev.costAds;
      const cur = hasProfitAds ? s.profitAds : s.costAds;
      const delta = hasProfitAds ? (cur - ref) : (ref - cur); // cost: lower = better
      const pct = Math.abs(ref) > 0.01 ? Math.abs(delta / ref * 100) : null;
      const up = delta >= 0;
      const c = up ? 'var(--accent2)' : 'var(--red)';
      arrow = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 6px;color:${c};font-size:10px;gap:1px;padding-top:14px">
        <span style="font-size:13px">${up?'▲':'▼'}</span>
        ${pct!==null?`<span style="font-weight:600">${pct.toFixed(0)}%</span>`:''}
      </div>`;
    }
    const isPartial = s.dayCount < s.dks.length;
    return `${arrow}<div style="min-width:110px;flex:1">
      <div style="font-size:10px;color:var(--mid);margin-bottom:5px;font-weight:500">${s.label}/${pad2(csvM)}${isPartial?` <span style="opacity:0.55">(${s.dayCount}z)</span>`:''}</div>
      <div style="font-size:12px;color:var(--mid);margin-bottom:2px">Cost+TVA: <strong style="color:rgba(200,55,55,0.9)">€${s.costAds.toFixed(2)}</strong></div>
      ${hasProfitAds?`<div style="font-size:12px;color:var(--mid)">Profit Ads: <strong style="color:${col(s.profitAds)}">€${s.profitAds.toFixed(2)}</strong></div>`:''}
    </div>`;
  }).join('');

  return `<div style="background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 18px;margin-bottom:14px">
    <div style="font-size:10px;font-weight:600;color:var(--mid);letter-spacing:0.07em;margin-bottom:10px">EVOLUȚIE SĂPTĂMÂNALĂ</div>
    <div style="display:flex;align-items:flex-start;flex-wrap:wrap;gap:4px">${cells}</div>
  </div>`;
}

function initChartDrag(el) {
  let down = false, startX = 0, startScroll = 0;
  el.addEventListener('mousedown', e => {
    down = true; startX = e.clientX; startScroll = el.scrollLeft;
    el.style.cursor = 'grabbing'; e.preventDefault();
  });
  const stop = () => { down = false; el.style.cursor = 'grab'; };
  el.addEventListener('mouseup', stop);
  el.addEventListener('mouseleave', stop);
  el.addEventListener('mousemove', e => {
    if (!down) return;
    el.scrollLeft = startScroll - (e.clientX - startX);
  });
  // Touch support
  el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startScroll = el.scrollLeft; }, { passive: true });
  el.addEventListener('touchmove', e => { el.scrollLeft = startScroll - (e.touches[0].clientX - startX); }, { passive: true });
}

function buildScrollableMonthChart(shopKey, shopAds, feeRate, rate) {
  const shopData = csvData[shopKey] || {};
  const pad2 = n => String(n).padStart(2,'0');
  const DAY_W = 30, H = 308, PT = 82, PB = 38, PL = 52, PR = 10;

  // All months with data in current year, plus csvMonth if missing
  const mKeys = [...new Set([
    ...Object.keys(shopData).filter(mk => mk.startsWith(currentCsvYear)),
    csvMonth
  ])].sort();

  // Build per-day points with absolute X positions
  const allPts = [], monthMeta = {};
  let xOff = PL;
  const _today = new Date();
  const todayY = _today.getFullYear(), todayM = _today.getMonth()+1, todayD = _today.getDate();
  mKeys.forEach(mk => {
    const [my, mm] = mk.split('-').map(Number);
    const dim = new Date(my, mm, 0).getDate();
    const isCurrentMk = my === todayY && mm === todayM;
    const maxDay = isCurrentMk ? todayD : dim;
    const mStartX = xOff;
    for (let day = 1; day <= maxDay; day++) {
      const dk = `${my}-${pad2(mm)}-${pad2(day)}`;
      const d = (shopData[mk] || {})[dk] || null;
      const dow = new Date(my, mm-1, day).getDay();
      const ndt = new Date(my, mm-1, day+1);
      const ndk = `${ndt.getFullYear()}-${pad2(ndt.getMonth()+1)}-${pad2(ndt.getDate())}`;
      const shiftedAds = ((shopData[ndk.substring(0,7)]||{})[ndk]||{}).etsyAds || 0;
      const px = xOff + (day - 0.5) * DAY_W;
      const base = { dk, mk, px, isWeekend: dow===0||dow===6, label: String(day) };
      if (!d) { allPts.push({...base, vanzari:null, costAds:null, profitZi:null, vanzAds:null, profitAds:null, organic:null}); }
      else {
        const hasEntry = dk in shopAds;
        const adsEur = (hasEntry ? parseFloat(shopAds[dk]||0) : 0) * (rate||1);
        const estFee = adsEur * (feeRate||0);
        const clickTVA = shiftedAds * 1.21, fullTVA = (shiftedAds + estFee) * 1.21;
        const dayInv = d.fees + shiftedAds + d.offsiteAds + (d.plus||0);
        const dayRev = d.sales + (d.refunds||0) - (d.buyerVat||0);
        const profitZi = dayRev - dayInv - dayInv * 0.21;
        const profitAds = hasEntry ? adsEur - fullTVA : null;
        allPts.push({...base, vanzari:d.sales, costAds:clickTVA, fullCostTVA:fullTVA, profitZi, vanzAds:hasEntry?adsEur:null, profitAds, organic:profitAds!==null?profitZi-profitAds:profitZi});
      }
    }
    monthMeta[mk] = { startX: mStartX, endX: xOff + maxDay*DAY_W, centerX: mStartX + maxDay*DAY_W/2 };
    xOff += maxDay * DAY_W;
  });
  const totalW = xOff + PR;
  const cH = H - PT - PB;

  // MA7
  allPts.forEach((p, i) => {
    const win = allPts.slice(Math.max(0,i-6),i+1).filter(q=>q.profitAds!==null);
    p.ma7 = win.length ? win.reduce((s,q)=>s+q.profitAds,0)/win.length : null;
  });

  // Weekly segments (Mon–Sun) per month
  const ptsByDk = {};
  allPts.forEach(p => { ptsByDk[p.dk] = p; });
  _csvPtsByDk = ptsByDk;
  const weekSegs = []; // { centerX, startX, endX, label, costAds, profitAds, hasProfit, mk }
  mKeys.forEach(mk => {
    const [my, mm] = mk.split('-').map(Number);
    const dim = new Date(my, mm, 0).getDate();
    const dow1 = new Date(my, mm-1, 1).getDay();
    const daysBack = dow1===0 ? 6 : dow1-1;
    let wStart = new Date(my, mm-1, 1-daysBack);
    while (true) {
      const wPts = [];
      for (let i=0; i<7; i++) {
        const c = new Date(wStart.getFullYear(), wStart.getMonth(), wStart.getDate()+i);
        if (c.getFullYear()===my && c.getMonth()+1===mm) {
          const pt = ptsByDk[`${my}-${pad2(mm)}-${pad2(c.getDate())}`];
          if (pt) wPts.push(pt);
        }
      }
      if (wPts.length >= 1) {
        let costAds=0, profitAds=0, hasProfit=false;
        wPts.forEach(p => {
          // use fullCostTVA (ads+fees+TVA) when available, fallback to costAds (ads+TVA only)
          const c = p.fullCostTVA != null ? p.fullCostTVA : p.costAds;
          if (c !== null && c !== undefined) costAds += c;
          if (p.profitAds!==null) { profitAds += p.profitAds; hasProfit = true; }
        });
        const pxs = wPts.map(p=>p.px);
        const startX = Math.min(...pxs)-DAY_W/2, endX = Math.max(...pxs)+DAY_W/2;
        weekSegs.push({ startX, endX, centerX:(startX+endX)/2, label:`${wPts[0].label}–${wPts[wPts.length-1].label}`, costAds, profitAds, hasProfit, mk, width: endX-startX });
      }
      wStart = new Date(wStart.getFullYear(), wStart.getMonth(), wStart.getDate()+7);
      if (wStart.getMonth()+1>mm || wStart.getFullYear()>my) break;
    }
  });

  // Scale
  const vals = [0];
  allPts.forEach(p => {
    if (chartVisible.vanzari  && p.vanzari!==null)    vals.push(p.vanzari);
    if (chartVisible.costAds  && p.costAds!==null)    vals.push(p.costAds);
    if (chartVisible.profitZi && p.profitZi!==null)   vals.push(p.profitZi);
    if (chartVisible.vanzAds  && p.vanzAds!==null)    vals.push(p.vanzAds);
    if (chartVisible.profitAds && p.profitAds!==null) vals.push(p.profitAds);
    if (chartVisible.organic  && p.organic!==null)    vals.push(p.organic);
    if (chartVisible.ma7      && p.ma7!==null)        vals.push(p.ma7);
  });
  let minV = Math.min(...vals), maxV = Math.max(...vals, 1);
  const pd = (maxV-minV)*0.1||1; minV -= pd*0.25; maxV += pd;
  const range = maxV - minV;
  const ys = v => PT + cH*(1-(v-minV)/range), y0 = ys(0);

  let svg = `<defs><linearGradient id="sgvS" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2d5a3d" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#2d5a3d" stop-opacity="0.02"/>
  </linearGradient></defs>`;

  // Current month highlight
  const cm = monthMeta[csvMonth];
  if (cm) svg += `<rect x="${cm.startX}" y="${PT}" width="${cm.endX-cm.startX}" height="${cH}" fill="rgba(80,130,210,0.05)"/>`;

  // Weekend stripes
  allPts.forEach(p => { if (p.isWeekend) svg += `<rect x="${(p.px-DAY_W/2).toFixed(1)}" y="${PT}" width="${DAY_W}" height="${cH}" fill="rgba(193,122,58,0.07)"/>`; });

  // Week separator lines (within months)
  weekSegs.forEach((ws, i) => {
    if (i>0 && ws.mk===weekSegs[i-1].mk)
      svg += `<line x1="${ws.startX.toFixed(1)}" y1="70" x2="${ws.startX.toFixed(1)}" y2="${PT+cH}" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>`;
  });

  // Weekly annotations + monthly ROAS at bottom
  const colP = v => v>=0 ? '#4a7c6f' : '#c84040';
  const bRoasW = feeRate > 0 ? 1 / (1 - feeRate * 1.21) : 2.0;

  // Monthly totals (for ROAS label at bottom)
  const monthlyStats = {};
  mKeys.forEach(mk => {
    let mCost=0, mProfit=0, hasProfit=false;
    allPts.filter(p=>p.mk===mk).forEach(p => {
      const c = p.fullCostTVA!=null ? p.fullCostTVA : p.costAds;
      if (c!==null && c!==undefined) mCost += c;
      if (p.profitAds!==null) { mProfit += p.profitAds; hasProfit=true; }
    });
    monthlyStats[mk] = { costAds:mCost, profitAds:mProfit, hasProfit };
  });

  // Weekly annotations
  weekSegs.forEach((ws, i) => {
    if (ws.width < 4*DAY_W) return;
    const cx = ws.centerX.toFixed(1);
    const prevSameMk = weekSegs.slice(0,i).reverse().find(w=>w.mk===ws.mk);
    const pctDelta = (prevSameMk && ws.hasProfit && prevSameMk.hasProfit && Math.abs(prevSameMk.profitAds)>0)
      ? (ws.profitAds - prevSameMk.profitAds) / Math.abs(prevSameMk.profitAds) * 100 : null;
    const arrow = pctDelta!==null ? (pctDelta>=0?' ▲':' ▼') : '';
    const pct   = pctDelta!==null ? Math.abs(Math.round(pctDelta))+'%' : '';
    const revenue = ws.hasProfit && ws.costAds>0 ? ws.profitAds+ws.costAds : null;
    const roas = revenue!==null ? revenue/ws.costAds : null;
    const roasCol = roas===null ? '#aaa' : roas>=bRoasW ? '#4a7c6f' : roas>=1 ? '#c17a3a' : '#c84040';
    svg += `<text x="${cx}" y="13" text-anchor="middle" font-size="10" fill="rgba(180,175,168,0.65)">${ws.label}</text>`;
    svg += `<text x="${cx}" y="27" text-anchor="middle" font-size="11" fill="rgba(200,80,80,0.9)">Cost+TVA: €${ws.costAds.toFixed(2)}</text>`;
    if (ws.hasProfit) {
      const deltaSuffix = (arrow||pct) ? `<tspan fill="${colP(pctDelta)}">${arrow}${pct}</tspan>` : '';
      svg += `<text x="${cx}" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="${colP(ws.profitAds)}">Profit: €${ws.profitAds.toFixed(2)}${deltaSuffix}</text>`;
      if (roas!==null) svg += `<text x="${cx}" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="${roasCol}">ROAS ${roas.toFixed(2)}×</text>`;
    }
  });

  // Month separators + labels (with monthly ROAS)
  mKeys.forEach((mk, i) => {
    const meta = monthMeta[mk], [my,mm] = mk.split('-').map(Number);
    if (i>0) svg += `<line x1="${meta.startX}" y1="70" x2="${meta.startX}" y2="${PT+cH+34}" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-dasharray="4,3"/>`;
    const isCur = mk===csvMonth;
    const ms = monthlyStats[mk];
    const rev = ms && ms.hasProfit && ms.costAds>0 ? ms.profitAds+ms.costAds : null;
    const mRoas = rev!==null ? rev/ms.costAds : null;
    const roasStr = mRoas!==null ? `  ·  ROAS ${mRoas.toFixed(2)}×` : '';
    svg += `<text x="${meta.centerX.toFixed(1)}" y="${PT+cH+31}" text-anchor="middle" font-size="11" font-weight="${isCur?'700':'400'}" fill="${isCur?'#c17a3a':'#b8b2a8'}">${LUNI[mm-1]} ${my}${roasStr}</text>`;
  });

  // Grid
  for (let t=0;t<=4;t++) {
    const v=minV+range*t/4, yg=ys(v).toFixed(1);
    svg += `<line x1="${PL}" y1="${yg}" x2="${totalW-PR}" y2="${yg}" stroke="#eae6df" stroke-width="1"/>`;
    svg += `<text x="${PL-3}" y="${(+yg+3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="#b8b2a8">€${v.toFixed(0)}</text>`;
  }
  if (minV<-0.5&&y0>PT&&y0<PT+cH) svg += `<line x1="${PL}" y1="${y0.toFixed(1)}" x2="${totalW-PR}" y2="${y0.toFixed(1)}" stroke="rgba(0,0,0,0.18)" stroke-width="1.5" stroke-dasharray="5,4"/>`;

  // Bars
  const barKeys = ['costAds','organic'].filter(k=>chartVisible[k]);
  const nB = barKeys.length, bW = nB>0 ? Math.max(3,DAY_W*0.56/nB) : DAY_W*0.56;
  const bCols = { costAds:{pos:'rgba(200,55,55,0.7)',neg:'rgba(200,55,55,0.7)'}, profitAds:{pos:'rgba(40,140,80,0.68)',neg:'rgba(200,55,55,0.5)'}, organic:{pos:'rgba(58,107,138,0.65)',neg:'rgba(200,55,55,0.4)'} };
  barKeys.forEach((key,bi) => {
    const off=(bi-(nB-1)/2)*bW, cols=bCols[key];
    allPts.forEach(p => {
      const v=p[key]; if(v===null) return;
      const bH=Math.max(1,Math.abs(ys(v)-y0)), by=Math.min(y0,ys(v)).toFixed(1), bx=(p.px+off-bW/2).toFixed(1);
      svg += `<rect x="${bx}" y="${by}" width="${bW.toFixed(1)}" height="${bH.toFixed(1)}" fill="${v>=0?cols.pos:cols.neg}" rx="2"/>`;
    });
  });

  // Lines
  const drawL = (key,color,fillId,dash='') => {
    let cur=[], out='';
    const flush = () => {
      if(!cur.length) return;
      const dp = cur.map((c,j)=>`${j?'L':'M'}${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');
      if(fillId&&cur.length>1){const f=cur[0],l=cur[cur.length-1];out+=`<path d="${dp} L${l.x.toFixed(1)},${(PT+cH).toFixed(1)} L${f.x.toFixed(1)},${(PT+cH).toFixed(1)} Z" fill="url(#${fillId})"/>`;}
      out+=`<path d="${dp}" fill="none" stroke="${color}" stroke-width="${dash?'1.5':'2'}" stroke-linejoin="round" stroke-linecap="round"${dash?` stroke-dasharray="${dash}"`:''} />`;
      cur=[];
    };
    allPts.forEach(p=>{ const v=p[key]; if(v!==null) cur.push({x:p.px,y:ys(v)}); else flush(); }); flush();
    if(!dash) allPts.forEach(p=>{ const v=p[key]; if(v!==null) out+=`<circle cx="${p.px.toFixed(1)}" cy="${ys(v).toFixed(1)}" r="2" fill="${color}" opacity="0.75"/>`; });
    return out;
  };
  if(chartVisible.vanzari)   svg+=drawL('vanzari','#3a6b8a','sgvS');
  if(chartVisible.profitZi)  svg+=drawL('profitZi','#28a050',null);
  if(chartVisible.profitAds) svg+=drawL('profitAds','#1aabab',null);
  if(chartVisible.vanzAds)   svg+=drawL('vanzAds','#c17a3a',null);
  if(chartVisible.ma7)       svg+=drawL('ma7','rgba(40,160,80,0.55)',null,'7,4');

  // Hover hit areas (transparent, on top of everything)
  allPts.forEach(p => {
    if (p.vanzari===null && p.costAds===null && p.profitAds===null && p.profitZi===null) return;
    svg += `<rect x="${(p.px-DAY_W/2).toFixed(1)}" y="${PT}" width="${DAY_W}" height="${cH}" fill="transparent" style="cursor:crosshair" onmouseenter="showCsvDayTip(event,'${p.dk}')" onmouseleave="hideCsvDayTip()"/>`;
  });

  // X labels
  allPts.forEach(p => svg+=`<text x="${p.px.toFixed(1)}" y="${PT+cH+13}" text-anchor="middle" font-size="9" fill="${p.isWeekend?'#c17a3a':'#b8b2a8'}"${p.isWeekend?' font-weight="600"':''}>${p.label}</text>`);
  svg += `<line x1="${PL}" y1="${(PT+cH).toFixed(1)}" x2="${(totalW-PR).toFixed(1)}" y2="${(PT+cH).toFixed(1)}" stroke="#ddd9d0" stroke-width="1"/>`;

  const svgHtml = `<svg width="${totalW}" height="${H}" style="display:block" xmlns="http://www.w3.org/2000/svg">${svg}</svg>`;
  const scrollTo = cm ? Math.max(0, cm.startX - PL - (typeof window!=='undefined'?window.innerWidth/4:200)) : 0;
  _csvChartMeta = { monthMeta, PL };
  return { html: svgHtml, scrollTo };
}

function buildChart(days, dayKeys, shiftedEtsyAds, shopAds, feeRate, rate) {
  const W=1000, H=230, PL=56, PR=18, PT=20, PB=34;
  const cW=W-PL-PR, cH=H-PT-PB;
  if (!dayKeys.length) return '<div class="empty-state">Nicio zi disponibilă.</div>';
  shopAds = shopAds || {};

  // Expand to full month so all days appear on the X axis
  const [fy, fm] = dayKeys[0].split('-').map(Number);
  const daysInMonth = new Date(fy, fm, 0).getDate();
  const allDayKeys = Array.from({length: daysInMonth}, (_, i) =>
    `${fy}-${String(fm).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`
  );
  const n = allDayKeys.length;

  // Pre-compute per-day data
  const pts = allDayKeys.map(dk => {
    const [yr, mo, dy] = dk.split('-').map(Number);
    const dow = new Date(yr, mo-1, dy).getDay();
    const base = { isWeekend: dow===0||dow===6, label: String(dy) };
    const d = days[dk];
    if (!d) return { ...base, vanzari: null, costAds: null, profitZi: null, vanzAds: null, profitAds: null, organic: null };
    const dayClickAds = shiftedEtsyAds[dk] || 0;
    const hasEntry = dk in shopAds;
    const adsUsd = hasEntry ? (parseFloat(shopAds[dk]) || 0) : 0;
    const adsEur = adsUsd * (rate||1);
    const estFeeAds = adsEur * (feeRate||0);
    const clickCostTVA = dayClickAds * 1.21;
    const fullCostTVA = (dayClickAds + estFeeAds) * 1.21;
    const dayInv = d.fees + dayClickAds + d.offsiteAds + (d.plus||0);
    const dayTVA = dayInv * 0.21;
    const dayRev = d.sales + (d.refunds||0) - (d.buyerVat||0);
    const profitZi = dayRev - dayInv - dayTVA;
    const profitAds = hasEntry ? adsEur - fullCostTVA : null;
    const organic = profitAds !== null ? profitZi - profitAds : profitZi;
    return { ...base, vanzari: d.sales, costAds: clickCostTVA, profitZi, vanzAds: hasEntry ? adsEur : null, profitAds, organic };
  });

  // 7-day moving average for Profit Ads
  pts.forEach((p, i) => {
    const win = pts.slice(Math.max(0, i - 6), i + 1).filter(q => q.profitAds !== null);
    p.ma7 = win.length > 0 ? win.reduce((s, q) => s + q.profitAds, 0) / win.length : null;
  });

  // Scale: collect all visible non-null values
  const allVals = [0];
  pts.forEach(p => {
    if (chartVisible.vanzari  && p.vanzari!==null)   allVals.push(p.vanzari);
    if (chartVisible.costAds  && p.costAds!==null)   allVals.push(p.costAds);
    if (chartVisible.profitZi && p.profitZi!==null)  allVals.push(p.profitZi);
    if (chartVisible.vanzAds  && p.vanzAds!==null)   allVals.push(p.vanzAds);
    if (chartVisible.profitAds && p.profitAds!==null) allVals.push(p.profitAds);
    if (chartVisible.organic  && p.organic!==null)   allVals.push(p.organic);
    if (chartVisible.ma7      && p.ma7!==null)       allVals.push(p.ma7);
  });
  let minV = Math.min(...allVals);
  let maxV = Math.max(...allVals, 1);
  const pad = (maxV - minV) * 0.1 || 1;
  minV -= pad * 0.25; maxV += pad;
  const range = maxV - minV;

  const ys = v => PT + cH * (1 - (v - minV) / range);
  const xs = i => PL + (i + 0.5) * cW / n;
  const y0 = ys(0);

  // Bar layout
  const barKeys = ['costAds','organic'].filter(k => chartVisible[k]);
  const nBars = barKeys.length;
  const barGroupW = Math.max(5, cW / n * 0.56);
  const barW = nBars > 0 ? barGroupW / nBars : barGroupW;
  const barColors = {
    costAds:   { pos:'rgba(200,55,55,0.7)',     neg:'rgba(200,55,55,0.7)' },
    profitAds: { pos:'rgba(40,140,80,0.68)',    neg:'rgba(200,55,55,0.5)' },
    organic:   { pos:'rgba(58,107,138,0.65)',   neg:'rgba(200,55,55,0.4)' },
  };

  let svg = '';

  // Defs
  svg += `<defs>
    <linearGradient id="sgv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d5a3d" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2d5a3d" stop-opacity="0.02"/>
    </linearGradient>
  </defs>`;

  // Weekend background stripes
  pts.forEach((p, i) => {
    if (!p.isWeekend) return;
    svg += `<rect x="${(PL + i*cW/n).toFixed(1)}" y="${PT}" width="${(cW/n).toFixed(1)}" height="${cH}" fill="rgba(193,122,58,0.07)"/>`;
  });

  // Grid lines
  for (let t=0; t<=4; t++) {
    const v = minV + range * t/4;
    const yg = ys(v).toFixed(1);
    svg += `<line x1="${PL}" y1="${yg}" x2="${W-PR}" y2="${yg}" stroke="#eae6df" stroke-width="1"/>`;
    svg += `<text x="${PL-4}" y="${(+yg+3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="#b8b2a8">€${v.toFixed(0)}</text>`;
  }

  // Zero line (only if negatives exist)
  if (minV < -0.5 && y0 > PT && y0 < PT+cH) {
    svg += `<line x1="${PL}" y1="${y0.toFixed(1)}" x2="${W-PR}" y2="${y0.toFixed(1)}" stroke="rgba(0,0,0,0.18)" stroke-width="1.5" stroke-dasharray="5,4"/>`;
  }

  // Bars side by side
  barKeys.forEach((key, bi) => {
    const offset = (bi - (nBars-1)/2) * barW;
    const cols = barColors[key];
    pts.forEach((p, i) => {
      const val = p[key];
      if (val === null) return;
      const bH = Math.max(1, Math.abs(ys(val) - y0));
      const by = (Math.min(y0, ys(val))).toFixed(1);
      const bx = (xs(i) + offset - barW/2).toFixed(1);
      svg += `<rect x="${bx}" y="${by}" width="${barW.toFixed(1)}" height="${bH.toFixed(1)}" fill="${val>=0?cols.pos:cols.neg}" rx="2"/>`;
    });
  });

  // Line + area helper (dash: optional stroke-dasharray string)
  const drawLine = (key, color, fillId, dash='') => {
    let segments = [], cur = [];
    pts.forEach((p, i) => {
      const v = p[key];
      if (v !== null) { cur.push({x: xs(i), y: ys(v)}); }
      else { if (cur.length) { segments.push(cur); cur = []; } }
    });
    if (cur.length) segments.push(cur);
    let out = '';
    const sw = dash ? '1.5' : '2';
    const dashAttr = dash ? ` stroke-dasharray="${dash}"` : '';
    segments.forEach(seg => {
      const d = seg.map((c,j) => `${j?'L':'M'}${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');
      if (fillId && seg.length > 1) {
        const f = seg[0], l = seg[seg.length-1];
        out += `<path d="${d} L${l.x.toFixed(1)},${(PT+cH).toFixed(1)} L${f.x.toFixed(1)},${(PT+cH).toFixed(1)} Z" fill="url(#${fillId})"/>`;
      }
      out += `<path d="${d}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linejoin="round" stroke-linecap="round"${dashAttr}/>`;
    });
    if (n <= 31 && !dash) {
      pts.forEach((p, i) => {
        const v = p[key];
        if (v === null) return;
        out += `<circle cx="${xs(i).toFixed(1)}" cy="${ys(v).toFixed(1)}" r="2.5" fill="${color}" opacity="0.8"/>`;
      });
    }
    return out;
  };

  if (chartVisible.vanzari)   svg += drawLine('vanzari',   '#3a6b8a', 'sgv');
  if (chartVisible.profitZi)  svg += drawLine('profitZi',  '#28a050', null);
  if (chartVisible.profitAds) svg += drawLine('profitAds', '#1aabab', null);
  if (chartVisible.vanzAds)   svg += drawLine('vanzAds',   '#c17a3a', null);
  if (chartVisible.ma7)       svg += drawLine('ma7', 'rgba(40,160,80,0.55)', null, '7,4');

  // X labels — show every day
  pts.forEach((p, i) => {
    svg += `<text x="${xs(i).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="9" fill="${p.isWeekend?'#c17a3a':'#b8b2a8'}"${p.isWeekend?' font-weight="600"':''}>${p.label}</text>`;
  });

  svg += `<line x1="${PL}" y1="${(PT+cH).toFixed(1)}" x2="${W-PR}" y2="${(PT+cH).toFixed(1)}" stroke="#ddd9d0" stroke-width="1"/>`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block" xmlns="http://www.w3.org/2000/svg">${svg}</svg>`;
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('keydown', function(e) {
  const mod = e.ctrlKey || e.metaKey;
  if (!mod) return;
  const k = e.key.toLowerCase();
  if (k === 'z' && !e.shiftKey) { e.preventDefault(); undoChange(); }
  if (k === 'y' || (k === 'z' && e.shiftKey)) { e.preventDefault(); redoChange(); }
}, true);

render();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
