<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etsy Statement 2026</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#274e61">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Statement 2026">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --dark: #1a1814;
    --mid: #6b6456;
    --accent: #c17a3a;
    --accent2: #4a7c6f;
    --blue: #3a6b8a;
    --red: #c14a4a;
    --border: #e0dbd0;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  .app-header {
    background: var(--dark);
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header h1 {
    font-family: Arial, sans-serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.02em;
  }
  .app-header span {
    color: var(--accent);
    font-size: 13px;
    font-weight: 300;
  }
  .header-actions { display: flex; gap: 10px; }

  /* BUTTONS */
  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .btn-outline {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
  }
  .btn-outline:hover { background: rgba(255,255,255,0.1); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { opacity: 0.88; }
  .btn-green { background: var(--accent2); color: white; }
  .btn-green:hover { opacity: 0.88; }
  .btn-dark { background: var(--dark); color: white; }
  .btn-dark:hover { opacity: 0.85; }
  .btn-red { background: var(--red); color: white; font-size: 12px; padding: 5px 10px; }
  .btn-red:hover { opacity: 0.85; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  /* TABS */
  .tabs-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    overflow-x: auto;
    padding: 0 24px;
    gap: 0;
  }
  .tabs-bar::-webkit-scrollbar { height: 3px; }
  .tabs-bar::-webkit-scrollbar-thumb { background: var(--border); }

  .tab-btn {
    padding: 14px 18px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--mid);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--dark); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab-btn.tab-anual {
    color: var(--blue);
    font-weight: 600;
  }
  .tab-btn.tab-anual.active { border-bottom-color: var(--blue); color: var(--blue); }

  /* MAIN CONTENT */
  .main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

  /* LUNAR VIEW */
  .lunar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .lunar-title {
    font-family: Arial, sans-serif;
    font-size: 26px;
    font-weight: 400;
  }
  .lunar-title span { color: var(--accent); }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 20px;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--dark);
    color: white;
    padding: 12px 14px;
    text-align: left;
    font-weight: 500;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 10px 14px; }

  /* Inline inputs in table */
  .td-input {
    background: transparent;
    border: none;
    font-family: Arial, sans-serif;
    font-size: 14px;
    color: var(--dark);
    width: 100%;
    outline: none;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .td-input:focus { background: var(--surface2); }
  .td-select {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--dark);
    padding: 3px 6px;
    cursor: pointer;
  }
  .td-select:focus { outline: none; border-color: var(--accent); }

  .tva-da { color: var(--accent); font-weight: 600; }
  .tva-nu { color: var(--mid); }

  .calc-cell { color: var(--mid); font-size: 13px; }
  .total-row td {
    background: var(--surface2);
    font-weight: 600;
    border-top: 2px solid var(--border);
  }
  .total-row td:first-child { color: var(--accent); font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }

  .add-row-wrap { padding: 14px; display: flex; justify-content: flex-start; }

  /* SUMMARY CARDS - lunar */
  .summary-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--mid); margin-bottom: 6px; }
  .card-value { font-family: Arial, sans-serif; font-size: 24px; }
  .card-value.accent { color: var(--accent); }
  .card-value.green { color: var(--accent2); }
  .card-value.blue { color: var(--blue); }
  .card-value.red { color: var(--red); }

  /* ANUAL VIEW */
  .anual-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .anual-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .anual-card h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--mid);
    margin-bottom: 4px;
  }
  .anual-card .big { font-family: Arial, sans-serif; font-size: 28px; margin-bottom: 4px; }
  .anual-card.highlight { background: var(--dark); color: white; }
  .anual-card.highlight h3 { color: rgba(255,255,255,0.5); }
  .anual-card.card-green { border-left: 4px solid var(--accent2); }
  .anual-card.card-red { border-left: 4px solid var(--red); }
  .anual-card.card-blue { border-left: 4px solid var(--blue); }
  .anual-card.card-accent { border-left: 4px solid var(--accent); }

  /* Anual table */
  .anual-section-title {
    font-family: Arial, sans-serif;
    font-size: 20px;
    margin-bottom: 14px;
    color: var(--dark);
  }

  .etsy-inputs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 20px;
  }
  .etsy-input-group {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    border-top: 3px solid var(--blue);
  }
  .etsy-input-group label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--mid);
    margin-bottom: 8px;
  }
  .etsy-input-group input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: Arial, sans-serif;
    font-size: 20px;
    color: var(--dark);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
  }
  .etsy-input-group input:focus { border-color: var(--blue); }

  /* Anual months table */
  .anual-table-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow-x: auto;
    margin-bottom: 28px;
  }
  .anual-table-wrap table thead th { font-size: 11px; background: #274e61 !important; color: white !important; }
  .col-manual { background: rgba(58, 107, 138, 0.08); }
  .col-calc { background: rgba(74, 124, 111, 0.05); }
  .col-taxe { background: rgba(193, 74, 74, 0.06); }
  .col-profit { background: rgba(74, 124, 111, 0.1); font-weight: 600; color: var(--accent2); }

  /* Parametri section */
  .parametri-section {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }
  .param-group { display: flex; flex-direction: column; gap: 4px; }
  .param-group label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--mid); }
  .param-group input {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    width: 160px;
    outline: none;
  }
  .param-group input:focus { border-color: var(--accent); }
  .param-note { font-size: 12px; color: var(--mid); font-style: italic; }

  /* Hidden input for import */
  #importInput { display: none; }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--mid);
    font-size: 13px;
  }

  .euro-val::before { content: '€'; font-size: 0.75em; margin-right: 2px; color: var(--mid); }
  .curr { font-size: 0.72em; color: var(--mid); margin-right: 2px; vertical-align: middle; }
  td.num, th.num { text-align: right; }
  .anual-table-wrap td:not(:first-child), .anual-table-wrap th:not(:first-child) { text-align: right; }
  .table-wrap td:nth-child(2), .table-wrap td:nth-child(4), 
  .table-wrap th:nth-child(2), .table-wrap th:nth-child(4) { text-align: right; }

  @media (max-width: 768px) {
    .main { padding: 16px; }
    .app-header { padding: 14px 16px; }
    .etsy-inputs { grid-template-columns: 1fr; }
    .summary-cards { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header class="app-header">
  <div>
    <h1>Dashboard Financiar 2026</h1>
    <span>II Daniela Nechita · toate valorile în EUR</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="exportData()">⬇ Export JSON</button>
    <button class="btn btn-outline" onclick="document.getElementById('importInput').click()">⬆ Import JSON</button>
    <input type="file" id="importInput" accept=".json" onchange="importData(event)">
  </div>
</header>

<nav class="tabs-bar" id="tabsBar"></nav>

<main class="main" id="mainContent"></main>

<script>
// ============================================================
// DATA
// ============================================================
const LUNI = ['Ian','Feb','Mar','Apr','Mai','Iun','Iul','Aug','Sep','Oct','Nov','Dec'];

const defaultData = () => ({
  parametri: {
    cas_anual: 2350,  // EUR aproximativ (11664 RON / ~4.97)
    cass_pct: 10,
    impozit_pct: 10
  },
  luni: Object.fromEntries(LUNI.map(l => [l, { cheltuieli: [] }])),
  etsy: Object.fromEntries(LUNI.map(l => [l, { ezplanning: 0, dnstudio: 0, dnshop: 0 }]))
});

let data = loadData();
let currentTab = 'ANUAL';

function loadData() {
  try {
    const saved = localStorage.getItem('financiar2026');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return defaultData();
}

function saveData() {
  localStorage.setItem('financiar2026', JSON.stringify(data));
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'II_Daniela_2026_backup.json';
  a.click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      data = JSON.parse(ev.target.result);
      saveData();
      render();
      alert('Import reușit!');
    } catch(err) {
      alert('Eroare la import. Fișier invalid.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ============================================================
// CALCULE
// ============================================================
function calcLunar(luna) {
  const cheltuieli = data.luni[luna].cheltuieli || [];
  const totalCheltuieli = cheltuieli.reduce((s, c) => s + (parseFloat(c.suma) || 0), 0);
  const totalTVA = cheltuieli.reduce((s, c) => s + (c.tva === 'DA' ? (parseFloat(c.suma) || 0) * 0.21 : 0), 0);
  const etsy = data.luni[luna].etsy_invoice || {};
  const etsyShops = ['ezplanning','dnstudio','dnshop'];
  let totalInvoiceEtsy = 0;
  let totalFeesEtsy = 0;
  let totalAdsEtsy = 0;
  etsyShops.forEach(shop => {
    const fees = parseFloat((etsy[shop] || {}).fees || 0);
    const ads = parseFloat((etsy[shop] || {}).ads || 0);
    totalFeesEtsy += fees;
    totalAdsEtsy += ads;
    totalInvoiceEtsy += fees + ads;
  });
  const tvaEtsy = totalInvoiceEtsy * 0.21;
  return { totalCheltuieli, totalTVA, totalInvoiceEtsy, totalFeesEtsy, totalAdsEtsy, tvaEtsy, totalTVAcomplet: totalTVA + tvaEtsy };
}

function calcAnual() {
  let totalVenit = 0, totalCheltuieli = 0, totalTVA = 0;
  const rezultateLuni = {};

  LUNI.forEach(luna => {
    const etsy = data.etsy[luna] || {};
    const venitEtsy = (etsy.ezplanning != null ? parseFloat(etsy.ezplanning) : 0) + (etsy.dnstudio != null ? parseFloat(etsy.dnstudio) : 0) + (etsy.dnshop != null ? parseFloat(etsy.dnshop) : 0);
    const { totalCheltuieli: chelt, totalTVA: tva, tvaEtsy, totalTVAcomplet } = calcLunar(luna);
    const venitNet = venitEtsy - chelt - totalTVAcomplet;
    const cas = venitEtsy > 0 ? (data.parametri.cas_anual || 0) / 12 : 0;
    const cass = venitNet * ((data.parametri.cass_pct || 10) / 100);
    const bazaImpozit = venitNet - cas - cass;
    const impozit = bazaImpozit > 0 ? bazaImpozit * ((data.parametri.impozit_pct || 10) / 100) : 0;
    const totalTaxe = cas + cass + impozit;
    const profit = venitNet - cas - cass - impozit;

    rezultateLuni[luna] = { venitEtsy, chelt, tva, tvaEtsy, totalTVAcomplet, venitNet, cas, cass, impozit, totalTaxe, profit };
    totalVenit += venitEtsy;
    totalCheltuieli += chelt;
    totalTVA += totalTVAcomplet;
  });

  const totalVenitNet = totalVenit - totalCheltuieli - totalTVA;
  const totalCAS = (data.parametri.cas_anual || 0);
  const totalCASS = totalVenitNet * ((data.parametri.cass_pct || 10) / 100);
  const bazaImpozit = totalVenitNet - totalCAS - totalCASS;
  const totalImpozit = bazaImpozit > 0 ? bazaImpozit * ((data.parametri.impozit_pct || 10) / 100) : 0;
  const totalTaxe = totalCAS + totalCASS + totalImpozit;
  const totalProfit = totalVenitNet - totalCAS - totalCASS - totalImpozit;

  // Taxe "pana azi" = doar lunile cu venit introdus
  let taxePanaAziCAS = 0, taxePanaAziCASS = 0, taxePanaAziImpozit = 0;
  LUNI.forEach(luna => {
    const r = rezultateLuni[luna];
    if (r.venitEtsy > 0 || (data.etsy[luna] && Object.values(data.etsy[luna]).some(v => v === 0))) {
      // luna are date introduse (venit sau explicit 0)
      const hasData = data.etsy[luna] && Object.values(data.etsy[luna]).some(v => v !== null);
      if (hasData) {
        taxePanaAziCAS += r.cas;
        taxePanaAziCASS += r.cass;
        taxePanaAziImpozit += r.impozit;
      }
    }
  });
  const totalTaxePanaAzi = taxePanaAziCAS + taxePanaAziCASS + taxePanaAziImpozit;

  return { rezultateLuni, totalVenit, totalCheltuieli, totalTVA, totalVenitNet, totalCAS, totalCASS, totalImpozit, totalTaxe, totalProfit, totalTaxePanaAzi, taxePanaAziCAS, taxePanaAziCASS, taxePanaAziImpozit };
}

// ============================================================
// FORMAT
// ============================================================
function fmt(val) {
  const n = parseFloat(val);
  if (isNaN(n) || n === 0) return '<span style="color:#d0ccc5;font-size:0.8em">—</span>';
  return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
function fmtInput(val) {
  const n = parseFloat(val);
  if (isNaN(n) || n === 0) return '';
  return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// ============================================================
// RENDER
// ============================================================
function renderTabs() {
  const bar = document.getElementById('tabsBar');
  let html = `<button class="tab-btn tab-anual ${currentTab === 'ANUAL' ? 'active' : ''}" onclick="switchTab('ANUAL')">📊 ANUAL</button>`;
  LUNI.forEach(l => {
    html += `<button class="tab-btn ${currentTab === l ? 'active' : ''}" onclick="switchTab('${l}')">${l}</button>`;
  });
  bar.innerHTML = html;
}

function switchTab(tab) {
  currentTab = tab;
  render();
}

function render() {
  renderTabs();
  if (currentTab === 'ANUAL') renderAnual();
  else renderLunar(currentTab);
}

// ============================================================
// LUNAR
// ============================================================
function renderLunar(luna) {
  const cheltuieli = data.luni[luna].cheltuieli || [];
  const { totalCheltuieli, totalTVA, totalInvoiceEtsy, totalFeesEtsy, totalAdsEtsy, tvaEtsy, totalTVAcomplet } = calcLunar(luna);

  let rows = '';
  cheltuieli.forEach((c, i) => {
    rows += `<tr>
      <td><input class="td-input" value="${c.descriere || ''}" onchange="updateChelt('${luna}',${i},'descriere',this.value)" placeholder="ex. Anthropic, Canva..."></td>
      <td><input class="td-input" type="text" inputmode="decimal" value="${c.suma !== '' && c.suma != null ? parseFloat(c.suma).toFixed(2) : ''}" onchange="updateChelt('${luna}',${i},'suma',this.value)" onblur="fmtCheltInput(this)" placeholder="—" style="width:90px;text-align:right"></td>
      <td>
        <select class="td-select" onchange="updateChelt('${luna}',${i},'tva',this.value)">
          <option value="NU" ${c.tva !== 'DA' ? 'selected' : ''}>NU</option>
          <option value="DA" ${c.tva === 'DA' ? 'selected' : ''}>DA</option>
        </select>
      </td>
      <td class="calc-cell ${c.tva === 'DA' ? 'tva-da' : 'tva-nu'}" style="text-align:right">
        ${c.tva === 'DA' && c.suma !== '' && c.suma != null ? '<span class="curr">€</span>' + fmt((parseFloat(c.suma)||0)*0.21) : '—'}
      </td>
      <td><button class="btn btn-red" onclick="deleteChelt('${luna}',${i})">✕</button></td>
    </tr>`;
  });

  document.getElementById('mainContent').innerHTML = `
    <div class="lunar-header">
      <div class="lunar-title">Cheltuieli <span>${luna}</span> 2026</div>
      <button class="btn btn-accent" onclick="addChelt('${luna}')">+ Adaugă cheltuială</button>
    </div>

    <div class="summary-cards">
      <div class="card">
        <div class="card-label">Total cheltuieli subscripții</div>
        <div class="card-value accent"><span class="curr">€</span>${fmt(totalCheltuieli)}</div>
      </div>
      <div class="card">
        <div class="card-label">TVA subscripții</div>
        <div class="card-value blue"><span class="curr">€</span>${fmt(totalTVA)}</div>
      </div>
      <div class="card" style="border-top:3px solid var(--blue)">
        <div class="card-label">TVA TOTAL de plată</div>
        <div class="card-value blue"><span class="curr">€</span>${fmt(totalTVAcomplet)}</div>
        <div style="font-size:11px;color:var(--mid);margin-top:4px">subscripții + Etsy (TVA €${fmt(tvaEtsy)})</div>
      </div>
      <div class="card" style="border-top:3px solid var(--accent)">
        <div class="card-label">Total invoiceuri Etsy</div>
        <div class="card-value accent"><span class="curr">€</span>${fmt(totalInvoiceEtsy)}</div>
        <div style="font-size:11px;color:var(--mid);margin-top:4px">Fees €${fmt(totalFeesEtsy)} · Ads €${fmt(totalAdsEtsy)}</div>
      </div>
    </div>


    <div style="margin-bottom:20px">
      <div style="font-family:Arial, sans-serif;font-size:18px;margin-bottom:12px">Invoiceuri Etsy <span style="color:var(--accent);font-size:14px;font-family:Arial, sans-serif;font-weight:400">· doar pentru calcul TVA, nu afectează profitul</span></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:35%">Shop</th>
              <th style="width:20%">Fees (€)</th>
              <th style="width:20%">Marketing/Ads (€)</th>
              <th style="width:15%">Total (€)</th>
              <th style="width:10%">TVA 21% (€)</th>
            </tr>
          </thead>
          <tbody>
            ${['EzPlanning Studio','DNDigital Store','DNDigital Shop'].map((shop, si) => {
              const key = ['ezplanning','dnstudio','dnshop'][si];
              const etsy = (data.luni[luna].etsy_invoice || {});
              const feesRaw = (etsy[key] || {}).fees;
              const adsRaw = (etsy[key] || {}).ads;
              const fees = feesRaw != null ? feesRaw : '';
              const ads = adsRaw != null ? adsRaw : '';
              const total = (parseFloat(fees)||0) + (parseFloat(ads)||0);
              const tva = total * 0.21;
              return `<tr>
                <td style="font-weight:500">${shop}</td>
                <td><input class="td-input" type="text" inputmode="decimal" value="${fees !== '' && fees != null ? parseFloat(fees).toFixed(2) : ''}"
                  onchange="updateEtsyInvoice('${luna}','${key}','fees',this.value)"
                  onblur="fmtCheltInput(this)"
                  placeholder="—" style="width:100px;text-align:right"></td>
                <td><input class="td-input" type="text" inputmode="decimal" value="${ads !== '' && ads != null ? parseFloat(ads).toFixed(2) : ''}"
                  onchange="updateEtsyInvoice('${luna}','${key}','ads',this.value)"
                  onblur="fmtCheltInput(this)"
                  placeholder="—" style="width:100px;text-align:right"></td>
                <td class="calc-cell"><span class="curr">€</span>${fmt(total)}</td>
                <td class="calc-cell tva-da"><span class="curr">€</span>${fmt(tva)}</td>
              </tr>`;
            }).join('')}
          </tbody>
          <tfoot>
            <tr class="total-row">
              <td>TOTAL</td>
              <td><span class="curr">€</span>${fmt(totalFeesEtsy)}</td>
              <td><span class="curr">€</span>${fmt(totalAdsEtsy)}</td>
              <td><span class="curr">€</span>${fmt(totalInvoiceEtsy)}</td>
              <td><span class="curr">€</span>${fmt(tvaEtsy)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>

    <div style="font-family:Arial, sans-serif;font-size:18px;margin-bottom:12px">Cheltuieli subscripții & altele</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:40%">Descriere</th>
            <th style="width:15%">Suma (€)</th>
            <th style="width:12%">TVA?</th>
            <th style="width:18%">TVA calculat (€)</th>
            <th style="width:8%"></th>
          </tr>
        </thead>
        <tbody id="cheltuieliBody">
          ${rows || '<tr><td colspan="5" class="empty-state">Nicio cheltuială adăugată. Apasă "+ Adaugă cheltuială"</td></tr>'}
        </tbody>
        <tfoot>
          <tr class="total-row">
            <td>TOTAL</td>
            <td><span class="curr">€</span>${fmt(totalCheltuieli)}</td>
            <td></td>
            <td><span class="curr">€</span>${fmt(totalTVA)}</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>
  `;
}

function addChelt(luna) {
  if (!data.luni[luna]) data.luni[luna] = { cheltuieli: [] };
  data.luni[luna].cheltuieli.push({ descriere: '', suma: '', tva: 'NU' });
  saveData();
  renderLunar(luna);
}

function updateChelt(luna, i, field, val) {
  data.luni[luna].cheltuieli[i][field] = val;
  saveData();
  // Re-render doar cardurile și totalurile, nu tot tabelul (păstrăm focusul)
  const { totalCheltuieli, totalTVA, totalInvoiceEtsy, totalFeesEtsy, totalAdsEtsy, tvaEtsy, totalTVAcomplet } = calcLunar(luna);
  // Update tva cell
  renderLunar(luna);
}

function deleteChelt(luna, i) {
  data.luni[luna].cheltuieli.splice(i, 1);
  saveData();
  renderLunar(luna);
}

function updateEtsyInvoice(luna, shop, field, val) {
  if (!data.luni[luna]) data.luni[luna] = { cheltuieli: [] };
  if (!data.luni[luna].etsy_invoice) data.luni[luna].etsy_invoice = {};
  if (!data.luni[luna].etsy_invoice[shop]) data.luni[luna].etsy_invoice[shop] = {};
  data.luni[luna].etsy_invoice[shop][field] = parseFloat(val) || 0;
  saveData();
  renderLunar(luna);
}

// ============================================================
// ANUAL
// ============================================================
function renderAnual() {
  const { rezultateLuni, totalVenit, totalCheltuieli, totalTVA, totalVenitNet,
          totalCAS, totalCASS, totalImpozit, totalTaxe, totalProfit,
          totalTaxePanaAzi, taxePanaAziCAS, taxePanaAziCASS, taxePanaAziImpozit } = calcAnual();

  let etsy_inputs = '';
  ['EzPlanning Studio', 'DNDigital Store', 'DNDigital Shop'].forEach((shop, si) => {
    const key = ['ezplanning','dnstudio','dnshop'][si];
    const totalShop = LUNI.reduce((s, l) => s + (parseFloat((data.etsy[l]||{})[key]) || 0), 0);
    etsy_inputs += `
      <div class="etsy-input-group">
        <label>${shop} · total an: €${fmt(totalShop)}</label>
        ${LUNI.map(luna => `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="width:32px;font-size:12px;color:var(--mid)">${luna}</span>
            <input type="number" step="0.01" value="${fmtInputVal((data.etsy[luna]||{})[key])}"
              onchange="updateEtsy('${luna}','${key}',this.value)"
              placeholder="" style="flex:1;padding:5px 8px;font-size:13px;font-family:Arial,sans-serif;text-align:right;letter-spacing:0">
          </div>
        `).join('')}
      </div>`;
  });

  let luniRows = '';
  LUNI.forEach(luna => {
    const r = rezultateLuni[luna];
    luniRows += `<tr>
      <td style="font-weight:600">${luna}</td>
      <td class="col-manual"><span class="curr">€</span>${fmt(r.venitEtsy)}</td>
      <td class="col-calc"><span class="curr">€</span>${fmt(r.chelt)}</td>
      <td class="col-calc"><span class="curr">€</span>${fmt(r.totalTVAcomplet)}</td>
      <td style="font-weight:500"><span class="curr">€</span>${fmt(r.venitNet)}</td>
      <td class="col-taxe"><span class="curr">€</span>${fmt(r.cas)}</td>
      <td class="col-taxe"><span class="curr">€</span>${fmt(r.cass)}</td>
      <td class="col-taxe"><span class="curr">€</span>${fmt(r.impozit)}</td>
      <td class="col-taxe" style="font-weight:600;color:var(--red)"><span class="curr">€</span>${fmt(r.totalTaxe)}</td>
      <td class="col-profit"><span class="curr">€</span>${fmt(r.profit)}</td>
    </tr>`;
  });

  document.getElementById('mainContent').innerHTML = `
    <div class="lunar-header">
      <div class="lunar-title">Centralizator <span>2026</span></div>
      <div style="display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--mid);text-align:right">
        <div>Plafon 1 CAS: bază ~€9.720/an · de plată <span style="color:var(--accent)">~€2.350/an</span></div>
        <div>Plafon 2 CAS: bază ~€19.440/an · de plată <span style="color:var(--accent)">~€4.700/an</span></div>
      </div>
    </div>

    <div style="background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr 1px 1fr;overflow:hidden">
      <div style="padding:12px 16px;text-align:center">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--mid);margin-bottom:6px;font-weight:500">Parametri calcul</div>
        <div style="display:flex;gap:12px;justify-content:center;align-items:flex-end;margin-bottom:6px">
          <div class="param-group" style="text-align:center">
            <label style="font-size:10px">CAS anual (€)</label>
            <input type="number" step="1" value="${data.parametri.cas_anual}" onchange="updateParam('cas_anual',this.value)" style="width:90px;text-align:center;padding:5px 8px">
          </div>
          <div class="param-group" style="text-align:center">
            <label style="font-size:10px">CASS (%)</label>
            <input type="number" step="0.1" value="${data.parametri.cass_pct}" onchange="updateParam('cass_pct',this.value)" style="width:55px;text-align:center;padding:5px 8px">
          </div>
          <div class="param-group" style="text-align:center">
            <label style="font-size:10px">Impozit (%)</label>
            <input type="number" step="0.1" value="${data.parametri.impozit_pct}" onchange="updateParam('impozit_pct',this.value)" style="width:55px;text-align:center;padding:5px 8px">
          </div>
        </div>
        <div style="font-size:10px;color:var(--mid)">CAS ≈ €2.350/an · primul plafon RON</div>
      </div>
      <div style="background:var(--border)"></div>
      <div style="padding:12px 16px;text-align:center">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--mid);margin-bottom:4px;font-weight:500">Taxe datorate până azi</div>
        <div style="font-family:Arial, sans-serif;font-size:20px;font-weight:600;color:var(--blue)"><span class="curr">€</span>${fmt(totalTaxePanaAzi)}</div>
        <div style="font-size:10px;color:var(--mid);margin-top:4px">CAS €${fmt(taxePanaAziCAS)} · CASS €${fmt(taxePanaAziCASS)} · Imp. €${fmt(taxePanaAziImpozit)}</div>
      </div>
      <div style="background:var(--border)"></div>
      <div style="padding:12px 16px;text-align:center">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--mid);margin-bottom:4px;font-weight:500">Am în cont</div>
        <div style="display:flex;align-items:center;gap:4px;justify-content:center">
          <span style="font-size:13px;color:var(--mid)">€</span>
          <input type="text" inputmode="decimal"
            value="${data.parametri.rezerva > 0 ? parseFloat(data.parametri.rezerva).toFixed(2) : ''}"
            onchange="updateParam('rezerva', this.value); renderAnual();"
            onblur="fmtCheltInput(this)"
            placeholder="0.00"
            style="border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-family:Arial, sans-serif;font-size:18px;font-weight:600;width:120px;outline:none;text-align:right">
        </div>
      </div>
      <div style="background:var(--border)"></div>
      <div style="padding:12px 16px;text-align:center">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--mid);margin-bottom:4px;font-weight:500">${parseFloat(data.parametri.rezerva||0) >= totalTaxePanaAzi ? '✓ Ești acoperită' : 'Mai trebuie'}</div>
        <div style="font-family:Arial, sans-serif;font-size:20px;font-weight:600;color:${parseFloat(data.parametri.rezerva||0) >= totalTaxePanaAzi ? 'var(--accent2)' : 'var(--red)'}">
          <span class="curr">€</span>${fmt(Math.abs(totalTaxePanaAzi - parseFloat(data.parametri.rezerva||0)))}
        </div>
      </div>
    </div>

    <div style="background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:0;display:flex;align-items:stretch;flex-wrap:nowrap;margin-bottom:12px;overflow:hidden">
      ${[
        {label:'Venit Etsy', val:totalVenit, color:'var(--dark)'},
        {label:'Cheltuieli', val:totalCheltuieli, color:'var(--accent)'},
        {label:'TVA de plată', val:totalTVA, color:'var(--blue)'},
        {label:'Venit Net', val:totalVenitNet, color:'var(--dark)'},
        {label:'Total Taxe', val:totalTaxe, color:'var(--red)', note:'CAS · CASS · Imp: €'+fmt(totalCAS)+' · €'+fmt(totalCASS)+' · €'+fmt(totalImpozit)},
        {label:'Profit Final', val:totalProfit, color:'var(--accent2)'},
      ].map((item, i) => `
        <div style="flex:1;padding:12px 12px;text-align:center;${i>0?'border-left:1px solid var(--border)':''}">
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--mid);margin-bottom:4px;font-weight:500;white-space:nowrap">${item.label}</div>
          <div style="font-family:Arial, sans-serif;font-size:18px;font-weight:600;color:${item.color};white-space:nowrap"><span class="curr">€</span>${fmt(item.val)}</div>
          ${item.note ? '<div style="font-size:9px;color:var(--mid);margin-top:2px;white-space:nowrap">'+item.note+'</div>' : ''}
        </div>
      `).join('')}
    </div>

    <div class="anual-section-title">Venit Etsy per magazin, per lună</div>
    <div class="etsy-inputs">${etsy_inputs}</div>

    <div class="anual-section-title">Detaliu pe luni</div>
    <div class="anual-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Luna</th>
            <th class="col-manual">Venit Etsy</th>
            <th class="col-calc">Cheltuieli</th>
            <th class="col-calc">TVA</th>
            <th>Venit Net</th>
            <th class="col-taxe">CAS</th>
            <th class="col-taxe">CASS</th>
            <th class="col-taxe">Impozit</th>
            <th class="col-taxe">Total Taxe</th>
            <th class="col-profit">Profit Final</th>
          </tr>
        </thead>
        <tbody>${luniRows}</tbody>
        <tfoot>
          <tr class="total-row">
            <td>TOTAL</td>
            <td><span class="curr">€</span>${fmt(totalVenit)}</td>
            <td><span class="curr">€</span>${fmt(totalCheltuieli)}</td>
            <td><span class="curr">€</span>${fmt(totalTVA)}</td>
            <td><span class="curr">€</span>${fmt(totalVenitNet)}</td>
            <td><span class="curr">€</span>${fmt(totalCAS)}</td>
            <td><span class="curr">€</span>${fmt(totalCASS)}</td>
            <td><span class="curr">€</span>${fmt(totalImpozit)}</td>
            <td><span class="curr">€</span>${fmt(totalTaxe)}</td>
            <td><span class="curr">€</span>${fmt(totalProfit)}</td>
          </tr>
        </tfoot>
      </table>
    </div>
  `;
}

function updateEtsy(luna, key, val) {
  if (!data.etsy[luna]) data.etsy[luna] = {};
  data.etsy[luna][key] = val === '' ? null : parseFloat(val);
  saveData();
  renderAnual();
}

function fmtInputVal(val) {
  if (val === null || val === undefined || val === '') return '';
  return parseFloat(val).toFixed(2);
}

function updateParam(key, val) {
  data.parametri[key] = parseFloat(val) || 0;
  saveData();
  renderAnual();
}

// ============================================================
// INIT
// ============================================================
render();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
